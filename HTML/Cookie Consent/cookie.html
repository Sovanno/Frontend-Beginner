<!DOCTYPE html>
<html>
    <head>
        <title>Cookie Consent</title>
        <link rel="stylesheet" href="/Frontend-Beginner/CSS/Cookie Consent/cookie.css">
    </head>
    <body>
        <main class="page-content">
            <h1>Welcome!</h1>
            <p>This page demonstrates a simple cookie consent banner built with JavaScript.</p>
        </main>
        <div id="cookieBanner" class="cookie-banner" role="dialog" aria-label="Cookie consent">
            <div class="message">
                <h2>We use cookies</h2>
                <p>
                    We use cookies to improve your experience, analyze site traffic, and
                    serve personalized content. By clicking "Accept", you consent to our
                    use of cookies.
                </p>
            </div>
            <div class="actions">
                <button class="btn-cancel" id="cancelBtn" aria-label="Cookie cancel">Сancel</button>
                <button class="btn-accept" id="acceptBtn" aria-label="Accept cookies">Accept</button>
            </div>
        </div>
        <script src="/Frontend-Beginner/JS/Cookie Consent/cookie.js"></script>
    </body>
</html>
