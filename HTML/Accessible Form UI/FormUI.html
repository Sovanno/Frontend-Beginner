<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступная форма регистрации</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Frontend-Beginner/CSS/Accessible Form UI/FormUI.css">
</head>
<body>

  <div class="form-container">
    <h1>Создать аккаунт</h1>
    <p class="subtitle">Заполните все поля для регистрации</p>

    <form novalidate> <!-- novalidate для отключения встроенной валидации, так как форма статична -->

      <!-- Полное имя -->
      <div class="form-group">
        <label for="full-name">Полное имя <span class="label-hint">(обязательно)</span></label>
        <input type="text" id="full-name" name="full-name" placeholder="Иван Иванов" required aria-required="true">
        <div class="error-message" id="full-name-error" role="alert"></div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email <span class="label-hint">(обязательно)</span></label>
        <input type="email" id="email" name="email" placeholder="ivan@example.com" required aria-required="true">
        <div class="error-message" id="email-error" role="alert"></div>
      </div>

      <!-- Пароль -->
      <div class="form-group">
        <label for="password">Пароль <span class="label-hint">(обязательно)</span></label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="Введите пароль" required aria-required="true" aria-describedby="password-requirements">
          <button type="button" class="toggle-password" aria-label="Показать пароль" aria-pressed="false">
            Показать
          </button>
        </div>
        <div class="error-message" id="password-error" role="alert"></div>
      </div>

      <!-- Подтверждение пароля -->
      <div class="form-group">
        <label for="confirm-password">Подтвердите пароль <span class="label-hint">(обязательно)</span></label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Повторите пароль" required aria-required="true">
          <button type="button" class="toggle-password" aria-label="Показать пароль" aria-pressed="false">
            Показать
          </button>
        </div>
        <div class="error-message" id="confirm-error" role="alert"></div>
      </div>

      <!-- Прогресс-бар -->
      <div class="progress-section" aria-label="Прогресс заполнения формы">
        <div class="progress-header">
          <span>Сложность пароля</span>
          <span id="progress-text">100%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" style="width: 100%;"></div>
        </div>
      </div>

      <!-- Чеклист требований -->
      <ul class="requirements" id="password-requirements">
        <li>
          <span class="icon success">✓</span>
          <span>Минимум 8 символов</span>
        </li>
        <li>
          <span class="icon success">✓</span>
          <span>Содержит заглавную букву</span>
        </li>
        <li>
          <span class="icon success">✓</span>
          <span>Содержит цифру</span>
        </li>
        <li>
          <span class="icon success">✓</span>
          <span>Содержит специальный символ</span>
        </li>
      </ul>

      <button type="submit" class="submit-btn">Зарегистрироваться</button>

    </form>
  </div>
</body>
</html>
