<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grid Layout</title>
  <link rel="stylesheet" href="/Frontend-Beginner/CSS/Image Grid Layout/ImageGrid.css">
</head>
<body>
  <div class="container">
    <h1>Галерея изображений</h1>
    <div class="grid">
      <!-- Изображение 1: туманный пляж со скалой -->
      <div class="grid-item item-1">
        <img src="https://img.goodfon.ru/wallpaper/nbig/e/a9/skaly-more-bereg-9.webp" alt="Туманный пляж с большой скалой">
      </div>
      <!-- Изображение 2: гостиная с белым диваном -->
      <div class="grid-item item-2">
        <img src="https://i.pinimg.com/originals/10/af/f2/10aff2d721b6a025d5e7bd75ce792295.jpg" alt="Гостиная с белым диваном и круглым окном">
      </div>
      <!-- Изображение 3: стол с едой -->
      <div class="grid-item item-3">
        <img src="https://avatars.mds.yandex.net/i?id=642bab93bba237142f34e8f0f5d3221d3761cccf-11551355-images-thumbs&n=13" alt="Стол с тарелками и мисками еды">
      </div>
      <!-- Изображение 4: здание с красной дверью -->
      <div class="grid-item item-4">
        <img src="https://png.pngtree.com/background/20230611/original/pngtree-red-door-and-tree-in-front-of-a-building-picture-image_3167831.jpg" alt="Здание с красной дверью и деревом">
      </div>
      <!-- Изображение 5: ряд белых жилых домов -->
      <div class="grid-item item-5">
        <img src="https://avatars.mds.yandex.net/i?id=837c0090cec7ac8e05af484ec822f0b4_l-5228102-images-thumbs&n=13" alt="Ряд белых жилых домов вдоль улицы">
      </div>
      <!-- Изображение 6: вид на пляж с холма -->
      <div class="grid-item item-6">
        <img src="https://img-fotki.yandex.ru/get/53993/84310678.7b/0_dfbef_683c6cc1_orig.jpg" alt="Вид на пляж с вершины холма">
      </div>
    </div>
  </div>
</body>
</html>
